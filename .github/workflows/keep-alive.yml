name: Keep-Alive for Onrender

on:
  schedule:
    # Executa a cada 10 minutos
    - cron: "*/10 * * * *"
  workflow_dispatch: # Permite executar manualmente

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Keep site awake
        run: |
          curl -s https://agrocoletivo.onrender.com/ > /dev/null
          echo "✅ Keep-alive ping enviado em $(date)"
