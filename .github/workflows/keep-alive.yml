name: Keep-Alive for Onrender

on:
  schedule:
    # Executa a cada 4 minutos para manter servidor 100% acordado
    - cron: "*/4 * * * *"
  workflow_dispatch: # Permite executar manualmente

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Keep site awake
        run: |
          curl -s https://agrocoletivo.onrender.com/api/ping > /dev/null
          echo "✅ Keep-alive ping enviado em $(date)"
