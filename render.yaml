services:
  - type: web
    name: agrocoletivo
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_APP_URL
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false

  - type: cron
    name: agrocoletivo-keep-alive
    schedule: "*/10 * * * *"
    dockerCommand: node /app/keep-alive.js
    envVars:
      - key: NODE_ENV
        value: production
